---
# ── Ansible ─────────────────────────────────────────────────────────────────
ansible_become_password: "{{ vault_ansible_password }}"

# ── System ────────────────────────────────────────────────────────────────────
timezone: "America/Los_Angeles"    # update to your TZ
locale: "en_US.UTF-8"
hostname: "jetson-homelab"

# ── Docker ────────────────────────────────────────────────────────────────────
docker_compose_dir: "/opt/homelab"
docker_log_max_size: "10m"
docker_log_max_file: "3"

# ── Container image versions ──────────────────────────────────────────────────
# Bump these deliberately — don't blindly trust :latest in production
homeassistant_image: "ghcr.io/home-assistant/home-assistant:stable"
unifi_image:         "lscr.io/linuxserver/unifi-network-application:latest"
mongo_image:         "mongo:4.4"     # HARD LIMIT: Mongo 5+ needs AVX — not on ARM/Jetson
portainer_image:     "portainer/portainer-ce:latest"

# ── UniFi ─────────────────────────────────────────────────────────────────────
unifi_mongo_dbname: "unifi"
unifi_mongo_host:   "unifi-db"
unifi_mongo_port:   "27017"

# ── Service ports ─────────────────────────────────────────────────────────────
homeassistant_port: 8123     # informational only — HA uses network_mode: host
unifi_https_port:   8443
unifi_inform_port:  8080
unifi_stun_port:    3478
portainer_port:     9443

# ── WiFi Configuration ───────────────────────────────────────────────────────
# Set wifi_enabled: true to configure WiFi (requires vault_wifi_ssid/password)
wifi_enabled: false          # toggle to true when you need WiFi
wifi_interface: "wlan0"      # default interface name on Jetson
wifi_country_code: "US"      # regulatory domain (US, GB, DE, etc.)
wifi_priority: 10            # priority for primary network
wifi_hidden: false           # set true if SSID is hidden
# wifi_backup_priority: 1    # uncomment if using backup network
