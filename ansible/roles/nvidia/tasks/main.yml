---
# ── Role: nvidia ──────────────────────────────────────────────────────────────
# Install JetPack/CUDA and NVIDIA container toolkit for Jetson Orin
# Enables GPU acceleration on host and in Docker containers

# ── JetPack / CUDA Installation ──────────────────────────────────────────────
- name: Detect Jetson L4T version from kernel
  ansible.builtin.shell:
    cmd: |
      # Extract L4T version from dpkg or kernel if available
      if dpkg -l nvidia-l4t-core 2>/dev/null | grep -q nvidia-l4t-core; then
        dpkg-query -W -f='${Version}' nvidia-l4t-core | cut -d'-' -f1
      else
        # Default to R36.4 for JetPack 6.1 (Orin Nano Super)
        echo "36.4"
      fi
  register: l4t_version_raw
  changed_when: false

- name: Set L4T version facts
  ansible.builtin.set_fact:
    l4t_version: "{{ l4t_version_raw.stdout | trim }}"
    l4t_release: "r{{ l4t_version_raw.stdout | trim }}"

- name: Display detected L4T version
  ansible.builtin.debug:
    msg: "Detected L4T version: {{ l4t_version }} (release: {{ l4t_release }})"

- name: Add NVIDIA L4T apt signing key
  ansible.builtin.apt_key:
    url: https://repo.download.nvidia.com/jetson/jetson-ota-public.asc
    keyring: /usr/share/keyrings/nvidia-jetson-keyring.gpg
    state: present

- name: Add NVIDIA L4T common repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/nvidia-jetson-keyring.gpg] https://repo.download.nvidia.com/jetson/common {{ l4t_release }} main"
    filename: nvidia-l4t-common
    state: present

- name: Add NVIDIA L4T t234 repository (Orin platform)
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/nvidia-jetson-keyring.gpg] https://repo.download.nvidia.com/jetson/t234 {{ l4t_release }} main"
    filename: nvidia-l4t-t234
    state: present

- name: Update apt cache after adding L4T repos
  ansible.builtin.apt:
    update_cache: true

- name: Install NVIDIA L4T CUDA runtime
  ansible.builtin.apt:
    name:
      - nvidia-l4t-cuda          # CUDA runtime libraries
    state: present

- name: Install CUDA toolkit
  ansible.builtin.apt:
    name:
      - cuda-toolkit-12-6        # CUDA 12.6 compiler and tools
    state: present

- name: Install cuDNN and TensorRT
  ansible.builtin.apt:
    name:
      - cudnn9-cuda-12-6         # cuDNN 9.x for CUDA 12.6
      - tensorrt                 # TensorRT inference optimizer
    state: present

- name: Install Jetson GPU tools
  ansible.builtin.apt:
    name:
      - nvidia-l4t-tools         # tegrastats, nvpmodel, jetson_clocks
    state: present

# ── NVIDIA Container Toolkit ─────────────────────────────────────────────────
- name: Add NVIDIA container toolkit GPG key
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \
        | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
    creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg

- name: Add NVIDIA container toolkit apt repository
  ansible.builtin.shell:
    cmd: |
      curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \
        | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' \
        > /etc/apt/sources.list.d/nvidia-container-toolkit.list
    creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

- name: Update apt cache after adding container toolkit repo
  ansible.builtin.apt:
    update_cache: true

- name: Install nvidia-container-toolkit
  ansible.builtin.apt:
    name: nvidia-container-toolkit
    state: present

- name: Configure Docker to use NVIDIA runtime (nvidia-ctk is idempotent)
  ansible.builtin.command:
    cmd: nvidia-ctk runtime configure --runtime=docker
  notify: restart docker

# ── Verification ─────────────────────────────────────────────────────────────
- name: Verify NVIDIA runtime appears in daemon.json
  ansible.builtin.command:
    cmd: grep -q "nvidia" /etc/docker/daemon.json
  register: nvidia_check
  changed_when: false
  failed_when: false

- name: Report NVIDIA runtime status
  ansible.builtin.debug:
    msg: "NVIDIA container runtime {{ 'IS' if nvidia_check.rc == 0 else 'IS NOT' }} configured in daemon.json"

- name: Check for tegrastats (Jetson GPU monitoring tool)
  ansible.builtin.command:
    cmd: which tegrastats
  register: tegrastats_check
  changed_when: false
  failed_when: false

- name: Check CUDA installation
  ansible.builtin.shell:
    cmd: |
      if [ -d /usr/local/cuda ]; then
        cat /usr/local/cuda/version.json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['cuda']['version'])" 2>/dev/null || \
        cat /usr/local/cuda/version.txt 2>/dev/null || \
        echo "CUDA directory exists"
      else
        echo "No CUDA found"
      fi
  register: cuda_version
  changed_when: false

- name: Report JetPack/CUDA status
  ansible.builtin.debug:
    msg: |
      JetPack/CUDA Status:
      - L4T Version: {{ l4t_version }}
      - CUDA: {{ cuda_version.stdout | trim }}
      - tegrastats: {{ 'available' if tegrastats_check.rc == 0 else 'not found' }}
      - Container toolkit: {{ 'configured' if nvidia_check.rc == 0 else 'not configured' }}

- name: Smoke-test GPU in Docker with L4T base image
  ansible.builtin.shell:
    cmd: |
      docker run --rm --runtime=nvidia \
        nvcr.io/nvidia/l4t-base:r36.2.0 \
        bash -c "cat /etc/nv_tegra_release && echo 'GPU access OK'"
  become_user: "{{ vault_ansible_user }}"
  register: gpu_test
  changed_when: false
  failed_when: false
  timeout: 180

- name: Report GPU container test result
  ansible.builtin.debug:
    msg: |
      GPU container test {{ 'PASSED' if gpu_test.rc == 0 else 'FAILED or SKIPPED' }}
      {{ gpu_test.stdout | default('(no output)') }}
