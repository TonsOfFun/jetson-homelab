---
# ── Role: base ────────────────────────────────────────────────────────────────
# System update, essential packages, SSH hardening, hostname, timezone

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ hostname }}"

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Update apt cache and upgrade all packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Install essential base packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - vim
      - htop
      - tmux
      - unzip
      - ca-certificates
      - gnupg
      - lsb-release
      - python3-pip
      - python3-docker        # required for Ansible docker modules
      - net-tools
      - nfs-common
      - avahi-daemon          # mDNS — required for HA device discovery
      - dbus                  # required for Bluetooth in HA
      - wpasupplicant         # WiFi support
      - wireless-tools        # iwconfig, iwlist, etc.
      - rfkill                # manage wireless device state
    state: present

- name: Install jetson-stats (jtop) for GPU/memory monitoring
  ansible.builtin.pip:
    name: jetson-stats
    state: present
  notify: restart jtop service

- name: Ensure SSH hardening config directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    mode: "0755"

- name: Harden SSH — disable password auth and root login
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    mode: "0600"
    content: |
      PasswordAuthentication no
      PermitRootLogin no
      PubkeyAuthentication yes
      AuthorizedKeysFile .ssh/authorized_keys
      PubkeyAcceptedAlgorithms +sk-ssh-ed25519@openssh.com,sk-ecdsa-sha2-nistp256@openssh.com
      X11Forwarding no
      AllowTcpForwarding no
  notify: restart sshd

- name: Ensure avahi-daemon is enabled and running
  ansible.builtin.systemd:
    name: avahi-daemon
    enabled: true
    state: started

- name: Ensure compose root directory exists
  ansible.builtin.file:
    path: "{{ docker_compose_dir }}"
    state: directory
    mode: "0755"
    owner: "{{ vault_ansible_user }}"
    group: "{{ vault_ansible_user }}"

- name: Set max power mode for Jetson (nvpmodel -m 0)
  ansible.builtin.command:
    cmd: nvpmodel -m 0
  changed_when: false
  ignore_errors: true   # not fatal if already set

- name: Enable jetson_clocks for maximum CPU/GPU frequencies
  ansible.builtin.command:
    cmd: jetson_clocks
  changed_when: false
  ignore_errors: true   # not fatal if already set

# ── WiFi Configuration (optional) ────────────────────────────────────────────
- name: Configure WiFi
  when: wifi_enabled | default(false)
  block:
    - name: Ensure WiFi is not blocked by rfkill
      ansible.builtin.command:
        cmd: rfkill unblock wifi
      changed_when: false
      ignore_errors: true

    - name: Deploy wpa_supplicant configuration
      ansible.builtin.template:
        src: wpa_supplicant.conf.j2
        dest: /etc/wpa_supplicant/wpa_supplicant.conf
        owner: root
        group: root
        mode: "0600"
      notify: restart wpa_supplicant

    - name: Deploy WiFi interface configuration
      ansible.builtin.template:
        src: wifi-interface.j2
        dest: "/etc/network/interfaces.d/{{ wifi_interface | default('wlan0') }}"
        owner: root
        group: root
        mode: "0644"
      notify: restart networking

    - name: Enable and start wpa_supplicant service
      ansible.builtin.systemd:
        name: wpa_supplicant
        enabled: true
        state: started

    - name: Bring up WiFi interface
      ansible.builtin.command:
        cmd: "ip link set {{ wifi_interface | default('wlan0') }} up"
      changed_when: false
      ignore_errors: true
