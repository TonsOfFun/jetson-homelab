[defaults]
inventory           = inventory/hosts.yml
roles_path          = roles
vault_password_file = ~/.ansible-vault-pass
host_key_checking   = False          # set to True once you've added the Jetson to known_hosts
retry_files_enabled = False
stdout_callback     = yaml
callbacks_enabled   = profile_tasks  # shows timing per task — useful for long provisions

[ssh_connection]
pipelining          = True           # speeds up playbook execution significantly
ssh_args            = -o ControlMaster=auto -o ControlPersist=60s
